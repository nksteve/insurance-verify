version: "3.9"

services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: insurance_verify
      POSTGRES_USER: ivuser
      POSTGRES_PASSWORD: ivpass_local
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ivuser -d insurance_verify"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build: .
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://ivuser:ivpass_local@db:5432/insurance_verify
      PVERIFY_MOCK_MODE: "true"
      LOG_LEVEL: INFO
      SECRET_KEY: demo-secret-key-change-in-prod
      API_KEY: demo-api-key
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./sample_data:/app/sample_data

volumes:
  pgdata:
